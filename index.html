<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio Code - Clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="vscode-app">
        <header class="title-bar">
            <div class="title-bar-menu">
                
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/9a/Visual_Studio_Code_1.35_icon.svg" alt="VS Code Logo" class="vscode-icon">
                <div class="menu-item" id="menu-file">File</div>
                <div class="menu-item" id="menu-edit">Edit</div>
                <div class="menu-item" id="menu-selection">Selection</div>
                <div class="menu-item" id="menu-view">View</div>
                <div class="menu-item" id="menu-go">Go</div>
                <div class="menu-item" id="menu-run">Run</div>
                <div class="menu-item" id="menu-more"><i class="fa-solid fa-ellipsis"></i></div>
            </div>
            <div class="title-bar-title">Visual Studio Code</div>

        </header>

        <div class="workbench">
            <nav class="activity-bar">
                <div class="activity-top">
                    <div class="activity-icon active" data-panel="explorer" title="Explorer">
                        <i class="fa-regular fa-copy"></i>
                    </div>
                    <div class="activity-icon" data-panel="search" title="Search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                    <div class="activity-icon" data-panel="source-control" title="Source Control">
                        <i class="fa-solid fa-code-branch"></i>
                    </div>
                    <div class="activity-icon" data-panel="run-debug" title="Run and Debug">
                        <i class="fa-solid fa-play"></i>
                    </div>
                    <div class="activity-icon" data-panel="extensions" title="Extensions">
                        <i class="fa-solid fa-cubes"></i>
                    </div>
                </div>
                <div class="activity-bottom">
                    <div class="activity-icon" title="Accounts">
                        <i class="fa-regular fa-circle-user"></i>
                    </div>
                    <div class="activity-icon" title="Manage">
                        <i class="fa-solid fa-gear"></i>
                    </div>
                </div>
            </nav>

            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <span id="sidebar-title">EXPLORER</span>
                    <div class="sidebar-actions">
                        <i class="fa-solid fa-ellipsis"></i>
                    </div>
                </div>
                <div class="sidebar-content" id="sidebar-content">
                    </div>
            </aside>

            <div class="resizer vertical-resizer" id="sidebar-resizer"></div>

            <main class="main-split">
                <section class="editor-area">
                    <div class="editor-tabs" id="editor-tabs">
                        </div>
                    <div class="editor-content">
                        <div id="monaco-editor-container" style="width: 100%; height: 100%;"></div>
                        <textarea id="code-editor" style="display: none;"></textarea>
                    </div>
                </section>

                <div class="resizer horizontal-resizer" id="panel-resizer"></div>

                <section class="bottom-panel" id="bottom-panel">
                    <div class="panel-header">
                        <div class="panel-tabs">
                            <div class="panel-tab">PROBLEMS</div>
                            <div class="panel-tab">OUTPUT</div>
                            <div class="panel-tab">DEBUG CONSOLE</div>
                            <div class="panel-tab active">TERMINAL</div>
                            <div class="panel-tab">PORTS</div>
                        </div>
                        <div class="panel-actions">
                            <i class="fa-solid fa-plus"></i>
                            <i class="fa-solid fa-trash-can"></i>
                            <i class="fa-solid fa-xmark" id="close-panel-btn"></i>
                        </div>
                    </div>
                    <div class="panel-content" id="terminal-content">
                        <div id="terminal-output"></div>
                        <div class="terminal-input-line">
                            <span class="prompt"></span>
                            <input type="text" id="terminal-input" autocomplete="off" spellcheck="false" autofocus>
                        </div>
                    </div>
                </section>
            </main>
        </div>

        <footer class="status-bar">
            <div class="status-left">
                <div class="status-item"><i class="fa-solid fa-code-branch"></i> main</div>
                <div class="status-item"><i class="fa-solid fa-arrows-rotate"></i></div>
                <div class="status-item"><i class="fa-solid fa-circle-xmark"></i> 0 <i class="fa-solid fa-triangle-exclamation"></i> 0</div>
            </div>
            <div class="status-right">
                <div class="status-item" id="status-line-col">Ln 1, Col 1</div>
                <div class="status-item">Spaces: 4</div>
                <div class="status-item">UTF-8</div>
                <div class="status-item">CRLF</div>
                <div class="status-item" id="status-language">Plain Text</div>
                <div class="status-item"><i class="fa-regular fa-bell"></i></div>
            </div>
        </footer>
    </div>
    <div class="theme-picker" id="theme-picker" style="display: none;">
      <h3>Select Color Theme</h3>
      <div class="theme-list">
        <!-- Dark Modern -->
        <div class="theme-item active" data-theme="vs-dark">
          <div class="theme-preview">
            <div class="theme-color" style="background: #1e1e1e;"></div>
            <div class="theme-color" style="background: #cccccc;"></div>
            <div class="theme-color" style="background: #007acc;"></div>
          </div>
          <span>Dark Modern</span>
        </div>
        <!-- Light Modern -->
        <div class="theme-item" data-theme="vs-light">
          <div class="theme-preview">
            <div class="theme-color" style="background: #ffffff;"></div>
            <div class="theme-color" style="background: #000000;"></div>
            <div class="theme-color" style="background: #007acc;"></div>
          </div>
          <span>Light Modern</span>
        </div>
        <!-- High Contrast -->
        <div class="theme-item" data-theme="hc-black">
          <div class="theme-preview">
            <div class="theme-color" style="background: #000000;"></div>
            <div class="theme-color" style="background: #ffffff;"></div>
            <div class="theme-color" style="background: #ffffff;"></div>
          </div>
          <span>High Contrast Dark</span>
        </div>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
