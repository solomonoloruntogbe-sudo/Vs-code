<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Studio Code</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:wght@400;500&family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
</head>
<body>

<div class="vsc-root">

  <!-- TITLE BAR -->
  <div class="vsc-titlebar">
    <div class="title-menu">
      <span id="menu-file">File</span>
      <span id="menu-edit">Edit</span>
      <span id="menu-selection">Selection</span>
      <span id="menu-view">View</span>
      <span id="menu-go">Go</span>
      <span id="menu-run">Run</span>
      <span id="menu-terminal">Terminal</span>
      <span id="menu-help">Help</span>
    </div>
    <div class="title-center">Visual Studio Code — VSCODE-CLONE</div>
    <div class="title-controls">
      <button class="title-btn" id="btn-maximize" title="Maximize">
        <svg viewBox="0 0 10 10"><path d="M0 0h10v10H0V0zm1 1v8h8V1H1z" fill="currentColor"/></svg>
      </button>
    </div>
  </div>


  <div class="vsc-body">

    <!-- ACTIVITY BAR -->
    <div class="activity-bar">
      <div class="activity-top">
        <div class="activ-icon active" data-panel="explorer" data-tip="Explorer (Ctrl+Shift+E)" onclick="switchPanel('explorer')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
        </div>
        <div class="activ-icon" data-panel="search" data-tip="Search (Ctrl+Shift+F)" onclick="switchPanel('search')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
        </div>
        <div class="activ-icon" data-panel="git" data-tip="Source Control (Ctrl+Shift+G)" onclick="switchPanel('git')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="2"/><circle cx="18" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><path d="M6 8v8M8 6h4a4 4 0 014 4v2"/></svg>
          <span class="badge">3</span>
        </div>
        <div class="activ-icon" data-panel="debug" data-tip="Run and Debug (Ctrl+Shift+D)" onclick="switchPanel('debug')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22a8 8 0 100-16 8 8 0 000 16z"/><path d="M9 9l6 3-6 3V9z" fill="currentColor" stroke="none"/><path d="M3 12h2M19 12h2M12 3v2M12 19v2"/></svg>
        </div>
        <div class="activ-icon" data-panel="extensions" data-tip="Extensions (Ctrl+Shift+X)" onclick="switchPanel('extensions')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><path d="M14 18h8M18 14v8"/></svg>
        </div>
      </div>
      <div class="activity-bottom">
        <div class="activ-icon" data-tip="Accounts" onclick="showNotif('Accounts coming soon','info')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
        <div class="activ-icon" data-tip="Manage" onclick="showThemePicker()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </div>

      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span id="sidebar-title">EXPLORER</span>
        <div class="sidebar-header-actions">
          <button title="New File" onclick="createNewFile()">
            <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M9.5 1.1l3.4 3.5.1.4v2h-1V6H8V2H3v12h4v1H2.5l-.5-.5v-13l.5-.5h6.7l.3.1zM9 2v3h2.9L9 2zm4 14h-1v-2H10v-1h2v-2h1v2h2v1h-2v2z"/></svg>
          </button>
          <button title="New Folder" onclick="createNewFolder()">
            <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M14 5h-3.5l-1-1H2.5l-.5.5v8l.5.5h12l.5-.5V5.5L14 5zm0 8H3V6h3.1l1 1H14v6zm-1-8V6h.5l-.5-.5V5zm1-1h-3.79l-1-1H2L1 3v10l1 1h12l1-1V6l-1-1z"/></svg>
          </button>
          <button title="Collapse All" onclick="collapseAll()">
            <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M9 9H4v1h5V9zm0-4H4v1h5V5zM4 7h5V6H4v1zm0 5h5v-1H4v1zM2 3l.5-.5h4L7 3v10l-.5.5h-4L2 13V3zm1 0v10h4V3H3zm7-1l.5-.5h2l.5.5v4l-.5.5h-2L10 6V2zm1 0v4h2V2h-2z"/></svg>
          </button>

        </div>
      </div>
      <div class="sidebar-body" id="sidebar-body"></div>
    </div>

    <!-- SIDEBAR RESIZE HANDLE -->
    <div class="resize-handle-h" id="sidebar-resize"></div>

    <!-- WORKBENCH (Editor + Panel) -->
    <div class="vsc-workbench">

      <!-- EDITOR GROUP -->
      <div class="editor-group" id="editor-group">
        <!-- TAB BAR -->
        <div class="tab-bar" id="tab-bar"></div>
        <!-- BREADCRUMB -->
        <div class="breadcrumb" id="breadcrumb"></div>
        <!-- EDITOR AREA -->
        <div class="editor-area" id="editor-area">
          <!-- Monaco / welcome loaded here -->
        </div>
      </div>

      <!-- PANEL RESIZE -->
      <div class="resize-handle-v" id="panel-resize"></div>

      <!-- PANEL -->
      <div class="panel" id="panel">
        <div class="panel-tab-bar">
          <div class="panel-tab active" data-tab="TERMINAL" onclick="switchPanelTab('TERMINAL')">TERMINAL</div>
          <div class="panel-tab" data-tab="PROBLEMS" onclick="switchPanelTab('PROBLEMS')">PROBLEMS <span style="background:#f14c4c;color:#fff;border-radius:10px;padding:0 5px;font-size:10px;margin-left:4px">2</span></div>
          <div class="panel-tab" data-tab="OUTPUT" onclick="switchPanelTab('OUTPUT')">OUTPUT</div>
          <div class="panel-tab" data-tab="DEBUG" onclick="switchPanelTab('DEBUG')">DEBUG CONSOLE</div>
          <div class="panel-actions">
            <button title="Split Terminal" onclick="showNotif('Split terminal coming soon','info')">
              <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M2 2h12v12H2V2zm1 7h5V3H3v6zm6-6v4h4V3H9zm4 5H9v4h4V8zM3 9v4h5V9H3z"/></svg>
            </button>
            <button title="Kill Terminal" onclick="initTerminal()">
              <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M8 8.707l3.646 3.647.708-.707L8.707 8l3.647-3.646-.707-.708L8 7.293 4.354 3.646l-.707.708L7.293 8l-3.646 3.647.707.707L8 8.707z"/></svg>
            </button>
            <button title="Maximize Panel" onclick="togglePanel()">
              <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M3 3h4v1H4v3H3V3zm6 0h4v4h-1V4h-3V3zM3 9h1v3h3v1H3V9zm9 3h-3v1h4V9h-1v3z"/></svg>
            </button>
            <button title="Close Panel" onclick="togglePanel()">
              <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M8 8.707l3.646 3.647.708-.707L8.707 8l3.647-3.646-.707-.708L8 7.293 4.354 3.646l-.707.708L7.293 8l-3.646 3.647.707.707L8 8.707z"/></svg>
            </button>
          </div>
        </div>
        <div class="panel-body" id="panel-body"></div>
      </div>

    </div><!-- end vsc-workbench -->

  </div><!-- end vsc-body -->

  <!-- STATUS BAR -->
  <div class="status-bar" id="status-bar">
    <div class="status-left">
      <div class="status-item" onclick="switchPanel('git')" title="Source Control">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><circle cx="6" cy="6" r="2"/><circle cx="10" cy="10" r="2"/><path d="M6 8v3a1 1 0 001 1h1"/><path d="M6 4V3"/></svg>
        main*
      </div>
      <div class="status-item" title="0 Errors, 2 Warnings" onclick="switchPanelTab('PROBLEMS'); if(!state.panelVisible)togglePanel();">
        <svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor"><circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3M8 11v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        0
        <svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor"><path d="M8 1L1 13h14L8 1zm0 2.8L13.5 12H2.5L8 3.8zM7.5 7v3h1V7h-1zm0 4v1h1v-1h-1z"/></svg>
        2
      </div>
    </div>
    <div class="status-right">
      <div class="status-item" id="status-cursor">Ln 1, Col 1</div>
      <div class="status-item">Spaces: 2</div>
      <div class="status-item">UTF-8</div>
      <div class="status-item">CRLF</div>
      <div class="status-item" id="status-lang">Plain Text</div>
      <div class="status-item" id="status-time">--:--</div>
      <div class="status-item" title="Notifications">
        <svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor"><path d="M8 1a5.5 5.5 0 00-5.5 5.5v2.6L1 11h14l-1.5-1.9V6.5A5.5 5.5 0 008 1zM6.5 13a1.5 1.5 0 003 0h-3z"/></svg>
      </div>
      <div class="status-item" title="Toggle Panel (Ctrl+J)" onclick="togglePanel()">
        <svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor"><path d="M1 2h14v12H1V2zm1 8h12V3H2v7zm0 1v2h12v-2H2z"/></svg>
      </div>
    </div>
  </div>

</div><!-- end vsc-root -->

<!-- COMMAND PALETTE -->
<div class="cmd-overlay" id="cmd-overlay">
  <div class="cmd-palette">
    <input class="cmd-input" id="cmd-input" placeholder="&gt; Type a command..." autocomplete="off">
    <div class="cmd-list" id="cmd-list"></div>
  </div>
</div>

<!-- NOTIFICATION AREA -->
<div class="notif-area" id="notif-area"></div>

<!-- THEME PICKER OVERLAY -->
<div class="theme-picker-overlay" id="theme-picker-overlay" aria-hidden="true">
  <div class="theme-picker-panel">
    <div class="theme-picker-header">
      <span>Color Theme</span>
      <button type="button" class="theme-picker-close" id="theme-picker-close" aria-label="Close theme picker">×</button>
    </div>
    <div class="theme-picker-grid" id="theme-picker-grid"></div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div class="ctx-menu" id="ctx-menu"></div>

<!-- DRAG OVERLAY -->
<div class="drag-overlay" id="drag-overlay"></div>

<!-- TITLE DROPDOWNS -->
<div id="title-dropdown-container" class="title-dropdown-container"></div>

<script src="script.js"></script>
</body>
</html>
